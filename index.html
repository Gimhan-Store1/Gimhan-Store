<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gimhan Store</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<div class="top-bar">

<div class="logo">

<img src="assets/logo.png" alt="Logo">

<div class="store-name">

<h2>Gimhan Store</h2>

<p>Gift Items & Toys</p>

</div>

</div>

<div class="search-box">

<input type="text"
id="search"
placeholder="Search Products...">

<i class="fa-solid fa-magnifying-glass"></i>

</div>

<div class="cart">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cart-count">0</span>

</div>

</div>

</header>

<section class="slider">

<div class="slides">

<img src="assets/banner1.jpg">

<img src="assets/banner2.jpg">

<img src="assets/banner1.jpg">

</div>

</section>

<section class="products">

<h2>Latest Products</h2>

<div class="product-grid">

<div class="product-card">

<img src="assets/products/product1.jpg" alt="Product">

<div class="product-info">

<h3>Teddy Bear</h3>

<p class="price">Rs.2,500</p>

<p class="discount">20% OFF</p>

<a href="product.html">

<button class="buy-btn">

View Product

</button>

</a>

</div>

</div>

<a href="product.html" class="product-link">

<div class="product-card">

<img src="assets/products/product1.jpg">

<div class="product-info">

<h3>Teddy Bear</h3>

<div class="rating">
★★★★★ <span>(125)</span>
</div>

<p class="price">
Rs.2,500
<span class="old-price">Rs.3,000</span>
</p>

<p class="discount">20% OFF</p>

</div>

</div>

</a>

  
<div class="product-card">

<img src="assets/products/product3.jpg">

<div class="product-info">

<h3>Toy Car</h3>

<p class="price">Rs.1,950</p>

<p class="discount">10% OFF</p>

<a href="product.html">

<button class="buy-btn">

View Product

</button>

</a>

</div>

</div>

<div class="product-card">

<img src="assets/products/product4.jpg">

<div class="product-info">

<h3>Baby Doll</h3>

<p class="price">Rs.2,850</p>

<p class="discount">25% OFF</p>

<a href="product.html">

<button class="buy-btn">

View Product

</button>

</a>

</div>

</div>

<div class="product-card">

<img src="assets/products/product5.jpg">

<div class="product-info">

<h3>Flower Gift</h3>

<p class="price">Rs.1,750</p>

<p class="discount">12% OFF</p>

<a href="product.html">

<button class="buy-btn">

View Product

</button>

</a>

</div>

</div>

<div class="product-card">

<img src="assets/products/product6.jpg">

<div class="product-info">

<h3>Soft Toy</h3>

<p class="price">Rs.2,950</p>

<p class="discount">30% OFF</p>

<a href="product.html">

<button class="buy-btn">

View Product

</button>

</a>

</div>

</div>

</div>

</section>
